<div class="gysl-mini-menu" id="btn-mini-menu" aria-hidden="true" role="menu">

    <!-- User profile header -->
    <div class="gysl-mini-menu__header">
        <div class="gysl-mini-menu__avatar" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </div>
        <div class="gysl-mini-menu__user-info">
            <span class="gysl-mini-menu__name" id="gysl-dropdown-name">—</span>
            <span class="gysl-mini-menu__email" id="gysl-dropdown-email">—</span>
        </div>
    </div>

    <div class="gysl-mini-menu__divider"></div>

    <!-- Menu items -->
    <ul class="gysl-mini-menu__list" role="none">
        <li role="none">
            <button class="gysl-mini-menu__item" data-mini="account" role="menuitem"
                onclick="gyslMiniAction('account')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Cuenta</span>
            </button>
        </li>
        <li role="none">
            <button class="gysl-mini-menu__item" data-mini="settings" role="menuitem"
                onclick="gyslMiniAction('settings')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                <span>Ajustes</span>
            </button>
        </li>
        <li role="none">
            <button class="gysl-mini-menu__item" data-mini="favoritos" role="menuitem"
                onclick="gyslMiniAction('favoritos')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15 9 22 9 16.5 13.5 18.5 21 12 16.8 5.5 21 7.5 13.5 2 9 9 9 12 2" />
                </svg>
                <span>Mis equipos favoritos</span>
            </button>
        </li>
    </ul>

    <div class="gysl-mini-menu__divider"></div>

    <!-- Logout -->
    <button class="gysl-mini-menu__item gysl-mini-menu__item--logout" id="gysl-btn-logout" role="menuitem"
        onclick="gyslLogout()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar sesión</span>
    </button>

</div>
